name: CI/CD Pipeline

# Quand est-ce que ce robot se déclenche ?
on:
  push:
    branches: [ "main", "master" ] # À chaque push sur la branche principale

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest # On demande à GitHub de nous prêter un serveur Linux gratuit

    steps:
    - name: 📥 Récupérer le code
      uses: actions/checkout@v3

    - name: 🐍 Installer Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: 📦 Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

    - name: 🧪 Lancer les tests
      run: |
        pytest