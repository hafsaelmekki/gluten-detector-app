# Replace the value below with your own Groq API key
# Get a key here: https://console.groq.com/keys
GROQ_API_KEY = "your_api_key_here"

# PostgreSQL connection string (Neon, etc.)
# Example: postgresql+psycopg2://user:password@host/dbname
DATABASE_URL = "postgresql+psycopg2://user:password@host/dbname"

# Public FastAPI URL (allows Streamlit to call the backend)
BACKEND_URL = "http://localhost:8000"
